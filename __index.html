<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --border: #2a2a2a;
    --accent: #c8f55a;
    --text: #e8e8e8;
    --muted: #666;
    --hover: #222;
    --toast-bg: #c8f55a;
    --toast-text: #0f0f0f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
  header { padding: 48px 40px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  header h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(28px, 5vw, 52px); letter-spacing: -1px; line-height: 1; }
  header h1 span { color: var(--accent); }
  .meta { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .controls { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 16px; border-radius: 4px; width: 260px; outline: none; transition: border-color 0.2s; }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--muted); }
  .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 10px 16px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
  .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 10px 16px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.save:hover { border-color: #5af5a8; color: #5af5a8; }
  .action-btn.saved { border-color: #5af5a8; color: #5af5a8; }
  .saved-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #5af5a8; margin-right: 6px; vertical-align: middle; opacity: 0; transition: opacity 0.3s; }
  .saved-dot.visible { opacity: 1; }
  .count { margin-left: auto; font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .click-hint { padding: 10px 40px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th { padding: 14px 20px 14px 40px; text-align: left; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 400; }
  th:not(:first-child) { padding-left: 20px; }
  tbody tr { border-bottom: 1px solid #1c1c1c; transition: background 0.15s; }
  tbody tr:hover { background: var(--hover); }
  td { padding: 16px 20px 16px 40px; font-size: 13px; line-height: 1.4; }
  td:not(:first-child) { padding-left: 20px; }
  .num { color: var(--muted); font-size: 11px; }
  .name { color: var(--text); font-weight: 500; }
  .gender-badge { display: inline-block; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; margin-left: 8px; font-weight: 400; }
  .gender-badge.m { background: #1a2a3a; color: #5aa8f5; }
  .gender-badge.f { background: #2a1a2a; color: #f55ab4; }
  .phone { color: #aaa; }
  .plot { color: var(--accent); font-size: 12px; }
  tbody td.copyable { cursor: pointer; position: relative; transition: color 0.15s; }
  tbody td.copyable:hover { color: var(--accent); }
  tbody td.copyable::after { content: '⎘'; font-size: 10px; margin-left: 6px; opacity: 0; transition: opacity 0.15s; color: var(--accent); }
  tbody td.copyable:hover::after { opacity: 1; }
  tbody td.copyable.flash { color: var(--accent); }
  #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--toast-bg); color: var(--toast-text); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: 1px; padding: 12px 24px; border-radius: 4px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 600px) { header, .controls, th, td { padding-left: 16px; } .search { width: 100%; } }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

const STORAGE_KEY = 'kenya_plot_b2_order';
const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  try {
    const savedNames = JSON.parse(saved);
    data.sort((a, b) => savedNames.indexOf(a.name) - savedNames.indexOf(b.name));
    document.getElementById('savedDot').classList.add('visible');
  } catch(e) { shuffle(data); }
} else {
  shuffle(data);
}

function reshuffle() {

  localStorage.removeItem(STORAGE_KEY);

  document.getElementById('saveBtn').classList.remove('saved');

  showToast('Order reshuffled');

function saveOrder() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data.map(r => r.name)));
  document.getElementById('savedDot').classList.add('visible');
  document.getElementById('saveBtn').classList.add('saved');
  showToast('Order saved — persists on reload');
}

let currentFilter = 'all';

function render(filter = 'all', search = '') {
  const tbody = document.getElementById('tbody');
  const countLabel = document.getElementById('countLabel');
  tbody.innerHTML = '';
  let count = 0;
  data.forEach(row => {
    const matchFilter = filter === 'all' || row.g === filter;
    const q = search.toLowerCase();
    const matchSearch = !q || row.name.toLowerCase().includes(q) || row.phone.includes(q) || row.plot.toLowerCase().includes(q);
    if (!matchFilter || !matchSearch) return;
    count++;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="num">${String(count).padStart(2,'0')}</td>
      <td class="name copyable" data-val="${row.name}">${row.name}<span class="gender-badge ${row.g.toLowerCase()}">${row.g}</span></td>
      <td class="phone copyable" data-val="${row.phone}">${row.phone}</td>
      <td class="plot copyable" data-val="${row.plot}">${row.plot}</td>
    `;
    tr.querySelectorAll('td.copyable').forEach(td => {
      td.addEventListener('click', e => { e.stopPropagation(); copyText(td.dataset.val, td); });
    });
    tbody.appendChild(tr);
  });
  countLabel.textContent = `${count} record${count !== 1 ? 's' : ''}`;
}

function copyText(text, td) {
  const doFlash = () => {
    if (td) { td.classList.add('flash'); setTimeout(() => td.classList.remove('flash'), 800); }
    showToast(`Copied: ${text.length > 32 ? text.slice(0,32)+'…' : text}`);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doFlash).catch(() => fallbackCopy(text, doFlash));
  } else { fallbackCopy(text, doFlash); }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

function filter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(currentFilter, document.getElementById('searchInput').value);
}

document.getElementById('searchInput').addEventListener('input', e => {
  render(currentFilter, e.target.value);
});
