{% extends 'base.html' %}
{% block title %}Settings | SEEPO{% endblock %}
{% block page_title %}System Settings{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <div class="mb-5">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Appearance</h5>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div>
                            <p class="mb-0 fw-semibold">Dark Mode</p>
                            <p class="text-muted small mb-0">Switch between light and dark themes</p>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="darkModeSwitch" style="width: 40px; height: 20px;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-4 text-center">
            <p class="text-muted small">Version 1.0.2-beta | SEEPO Accounting System</p>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const sw = document.getElementById('darkModeSwitch');
    const currentTheme = localStorage.getItem('theme') || 'light';
    
    if (currentTheme === 'dark') {
        sw.checked = true;
    }
    
    sw.addEventListener('change', function() {
        const theme = this.checked ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    });
});
</script>
{% endblock %}
